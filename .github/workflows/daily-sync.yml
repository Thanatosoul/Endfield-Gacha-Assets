name: Daily Pool Assets Sync

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx

      - name: Run sync script
        run: python scripts/sync-daily.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          changed_files="$(git diff --staged --name-only)"
          changes=()
          if grep -q '^raw/TableCfg/' <<< "$changed_files"; then
            changes+=("更新 TableCfg")
          fi
          if grep -q '^public/data/GachaPoolTable\.json$' <<< "$changed_files"; then
            changes+=("发现新池")
          fi
          if grep -q '^public/images/' <<< "$changed_files"; then
            changes+=("同步资源")
          fi
          if [ ${#changes[@]} -eq 0 ]; then
            changes=("更新同步脚本")
          fi
          message="$(IFS='，'; echo "${changes[*]}")"
          git commit -m "chore: ${message} ($(date +%Y%m%d))"
          git push
